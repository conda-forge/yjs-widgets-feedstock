schema_version: 1

context:
  name: yjs-widgets
  version: "0.6.0"

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/yjs_widgets-${{ version }}.tar.gz
  sha256: 6eaf3673a5147bccf20d32f63bc40a387d9edee8d22bdefe85dce3d2f9f6b5e0

build:
  number: 0

outputs:
  - package:
      name: ${{ name|lower }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install --no-deps --no-build-isolation -vv .
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - yarn =3
        - hatchling
        - hatch-nodejs-version
        - hatch-jupyter-builder
        - jupyterlab >=4.0.0,<5
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - yjs_widgets
          pip_check: true
          python_version: ${{ python_min }}
      - requirements:
          run:
            - pip
            - jupyterlab >=4,<5
            - python ==${{ python_min }}
        script:
          - if: unix
            then:
              - jupyter labextension list
              - jupyter labextension list 1>labextensions 2>&1
              - cat labextensions | grep "yjs-widgets.*OK"

  - package:
      name: ${{ name|lower }}-collection
    build:
      noarch: python
      script: |
        ${{ PYTHON }} -m pip install \
          --no-deps --no-build-isolation -vv \
          examples/yjs-widget-controls/
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - yarn =3
        - hatchling
        - hatch-nodejs-version
        - hatch-jupyter-builder
        - jupyterlab >=4.0.0,<5
      run:
        - ${{ pin_subpackage(name | lower, exact=true) }}
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - yjs_widget_controls
          pip_check: false
          python_version: ${{ python_min }}
      - requirements:
          run:
            - pip
            - jupyterlab >=4,<5
            - python ==${{ python_min }}
        script:
          - if: unix
            then:
              - jupyter labextension list
              - jupyter labextension list 1>labextensions 2>&1
              - cat labextensions | grep "yjs-widget-controls.*OK"

about:
  summary: A JupyterLab extension for widgets based on Yjs
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/QuantStack/yjs-widgets
  repository: https://github.com/QuantStack/yjs-widgets

extra:
  recipe-maintainers:
    - davidbrochart
    - trungleduc
    - martinRenou
